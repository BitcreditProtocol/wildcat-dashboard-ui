name: CI

on:
  push:
    branches: ["master", "dev"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (style, lint, test, build)
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 22

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Node.js (${{ env.NODE_VERSION }})
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check code style
        run: npx prettier --check "src/**/*.{ts,tsx,json,css,md}"

      - name: Lint
        run: npm run lint

      - name: Run tests and generate coverage + JUnit report
        run: npm run test -- --run --coverage --reporter=default --reporter=junit --outputFile.junit=./coverage/junit.xml

      - name: Build
        run: npm run build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/junit.xml
          report_type: test_results
